version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sentinelshield_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: sentinelshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend
    container_name: sentinelshield_backend
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=sentinelshield
      - USE_POSTGRES=true
      - SIMULATOR_ENABLED=true
      - SIMULATOR_INTERVAL=5
    ports:
      - "5000:5000"
    depends_on:
      - db
    restart: always

  frontend:
    build: ./frontend
    container_name: sentinelshield_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
